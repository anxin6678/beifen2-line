<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>OMGkawaiiAngel 🔴 糖糖的秘密直播间</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/mqtt/4.2.8/mqtt.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #7b2cbf;
            --neon-cyan: #00ffff;
            --window-bg: #161224;
            --desktop-bg: #0d0a16;
            --text-color: #ffffff;
            --bubble-self: #ff007f;
            --bubble-other: #251f3d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; 
            background-color: var(--desktop-bg); color: var(--text-color); 
            height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; 
            -webkit-user-select: none; user-select: none;
        }
        input { -webkit-user-select: text; user-select: text; }

        /* 1. 糖糖赛博风登录视窗 */
        .login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(13, 10, 22, 0.96); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; 
        }
        .window-frame {
            width: 100%; max-width: 360px; background: var(--window-bg);
            border: 2px solid var(--neon-pink); border-radius: 12px;
            box-shadow: 0 0 20px var(--neon-pink); display: flex; flex-direction: column; overflow: hidden;
        }
        .window-header {
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: bold; letter-spacing: 1px; color: #fff;
        }
        .window-body { padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .avatar-upload-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .avatar-preview {
            width: 76px; height: 76px; border-radius: 50%; border: 2px dashed var(--neon-cyan);
            display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; cursor: pointer;
        }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview svg { width: 38px; height: 38px; fill: var(--neon-cyan); }
        
        .nickname-input { 
            width: 100%; background: #000; border: 1px solid var(--neon-purple); 
            padding: 12px; border-radius: 8px; color: #fff; font-size: 14px; outline: none; text-align: center; 
        }
        .nickname-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        
        .enter-btn { 
            background: var(--neon-pink); color: white; border: none; padding: 14px; 
            font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; 
            text-shadow: 0 0 5px #000; box-shadow: 0 4px 10px rgba(255,0,127,0.4);
        }

        /* 2. 主聊天室面板 */
        .room-container { 
            width: 100%; height: 100dvh; background: var(--desktop-bg);
            display: flex; flex-direction: column; position: relative; overflow: hidden; 
        }
        @media (min-width: 768px) { 
            .room-container { width: 414px; height: 840px; border-radius: 16px; border: 2px solid var(--neon-purple); box-shadow: 0 0 30px rgba(123,44,191,0.5); } 
        }

        .room-header-bar {
            padding: 12px 15px; background: var(--window-bg); display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-purple); flex-shrink: 0;
        }
        .angel-status { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%; animation: pulse 1s infinite; }

        /* 重构：双轨道高级电竞控音调音面板 */
        .control-panel {
            background: #141022; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px;
            border-bottom: 2px solid rgba(123,44,191,0.2); flex-shrink: 0;
        }
        .volume-slider-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11px; color: #a29bbd; }
        .volume-slider-wrap span { width: 75px; flex-shrink: 0; }
        .volume-slider { flex: 1; accent-color: var(--neon-pink); height: 4px; cursor: pointer; background: #000; border-radius: 2px; }
        .volume-slider.mic-style { accent-color: var(--neon-cyan); }

        /* 3. 麦位网格 */
        .seats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 8px; padding: 15px 10px; background: #0b0813; flex-shrink: 0; }
        .seat-item { display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: transform 0.1s; }
        .seat-item.shake-animation { animation: shakeEffect 0.4s ease-in-out; }

        .seat-avatar-wrap { 
            width: 52px; height: 52px; border-radius: 50%; background: #221a36; 
            position: relative; display: flex; justify-content: center; align-items: center; border: 2px solid transparent; 
        }
        .seat-avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .seat-avatar-wrap svg { width: 32px; height: 32px; fill: #4a3e6d; }
        
        .seat-item.speaking .seat-avatar-wrap { 
            border-color: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan); 
        }
        .seat-index { position: absolute; bottom: -4px; background: var(--neon-purple); font-size: 9px; padding: 1px 6px; border-radius: 8px; white-space: nowrap; border: 1px solid var(--neon-pink); }
        .user-name { font-size: 11px; color: #a29bbd; margin-top: 8px; max-width: 58px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .seat-pop-effect { position: absolute; top: -18px; background: var(--neon-pink); padding: 2px 6px; border-radius: 8px; font-size: 12px; box-shadow: 0 0 8px var(--neon-pink); display: none; z-index: 10; font-weight: bold; pointer-events: none; }

        /* 4. 公屏区 */
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
        .msg-system { background: rgba(0,255,255,0.08); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); align-self: center; font-size: 11px; padding: 5px 12px; border-radius: 10px; width: 90%; text-align: center; }
        .msg-superchat { background: linear-gradient(135deg, #ff0055, #7b2cbf); border: 2px solid #ff00ffff; color: #fff; align-self: center; font-size: 13px; padding: 8px 15px; border-radius: 12px; width: 92%; box-shadow: 0 0 15px #ff0055; font-weight: bold; }

        .bubble-row { display: flex; gap: 8px; max-width: 85%; }
        .bubble-row.self { align-self: flex-end; flex-direction: row-reverse; }
        .bubble-row.other { align-self: flex-start; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--neon-purple); }
        .msg-body-wrap { display: flex; flex-direction: column; gap: 2px; }
        .bubble-row.self .msg-body-wrap { align-items: flex-end; }
        .msg-username { font-size: 11px; color: #7e75a0; margin-left: 2px; }
        .bubble-row.self .msg-username { display: none; }
        
        .line-bubble { padding: 9px 12px; border-radius: 14px; font-size: 13px; line-height: 1.45; word-break: break-all; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .bubble-row.other .line-bubble { background: var(--bubble-other); color: #fff; border-top-left-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        .bubble-row.self .line-bubble { background: var(--bubble-self); color: #fff; border-top-right-radius: 2px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        .chat-img { max-width: 140px; max-height: 140px; border-radius: 8px; margin-top: 3px; cursor: pointer; border: 1px solid var(--neon-purple); transition: transform 0.2s; }

        /* 5. 趣味操作面板 */
        .game-feature-panel { background: var(--window-bg); border-top: 2px solid var(--neon-purple); display: flex; padding: 6px 12px; gap: 14px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .game-feature-panel::-webkit-scrollbar { display: none; }
        .feat-btn { padding: 4px 10px; font-size: 12px; border: 1px solid var(--neon-pink); background: transparent; color: var(--neon-pink); border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .feat-btn.meds { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .feat-btn.sc { border-color: #ffb703; color: #ffb703; }

        /* 底部主控制栏 */
        .bottom-bar { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: #110d1c; display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 99; border-top: 1px solid var(--neon-purple); }
        .bar-icon { font-size: 22px; cursor: pointer; color: var(--neon-purple); display: flex; align-items: center; }
        .input-box { flex: 1; background: #000; border: 1px solid var(--neon-purple); padding: 10px 14px; border-radius: 20px; color: #fff; font-size: 13px; outline: none; }
        .input-box:focus { border-color: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }
        .btn-icon { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.04); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        .btn-icon.active { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* 6. 高清灯箱放大缩小模态窗 */
        .lightbox-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,3,10,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .lightbox-header { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; color: #fff; font-size: 14px; z-index: 10002; }
        .lightbox-close { font-size: 24px; cursor: pointer; color: var(--neon-pink); font-weight: bold; }
        .lightbox-img-wrap { max-width: 90%; max-height: 75%; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: transform 0.1s ease; }
        .lightbox-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 25px var(--neon-purple); border: 2px solid var(--neon-pink); }
        .lightbox-controls { position: absolute; bottom: 35px; display: flex; gap: 25px; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 20px; border: 1px solid var(--neon-purple); z-index: 10002; }
        .zoom-btn { background: transparent; border: none; color: var(--neon-cyan); font-size: 18px; font-weight: bold; cursor: pointer; width: 35px; }

        .glitch-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,255,255,0.15); z-index: 9998; mix-blend-mode: overlay; pointer-events: none; display: none; animation: flashEffect 0.2s infinite; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes flashEffect { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }
        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px) rotate(-3deg); }
            40%, 80% { transform: translateX(6px) rotate(3deg); }
        }
    </style>
</head>
<body>

<div class="glitch-overlay" id="glitchOverlay"></div>

<div class="lightbox-modal" id="lightboxModal">
    <div class="lightbox-header">
        <span>OMG网络图片浏览器 1.0</span>
        <span class="lightbox-close" onclick="closeLightbox()">✕ 关闭</span>
    </div>
    <div class="lightbox-img-wrap" id="lightboxImgWrap">
        <img src="" id="targetLightboxImg" alt="大图">
    </div>
    <div class="lightbox-controls">
        <button class="zoom-btn" onclick="adjustImageZoom(0.2)">➕</button>
        <button class="zoom-btn" onclick="resetImageZoom()">🔄</button>
        <button class="zoom-btn" onclick="adjustImageZoom(-0.2)">➖</button>
    </div>
</div>

<div class="login-overlay" id="loginOverlay">
    <div class="window-frame">
        <div class="window-header">
            <span>INTERNET_ANGEL.EXE</span>
            <span>■ ✕</span>
        </div>
        <div class="window-body">
            <h2>OMGkawaiiAngel 连麦登记</h2>
            <div class="avatar-upload-wrap">
                <div class="avatar-preview" onclick="document.getElementById('avatarInput').click()" id="avatarPreview">
                    <svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z"/></svg>
                </div>
                <span style="font-size:11px; color:#6b5f93;">点击框框上传自定义头像</span>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="loadCustomAvatar(this)">
            </div>
            <input type="text" class="nickname-input" id="nicknameInput" placeholder="输入群聊网名(支持中文)" maxlength="8">
            <button class="enter-btn" onclick="launchAngelRoom()">合流连接入直播间</button>
        </div>
    </div>
</div>

<div class="room-container">
    <div class="room-header-bar">
        <div class="angel-status">
            <div class="status-dot"></div>
            <span>超天酱的秘密联络网</span>
        </div>
        <span style="font-size:12px; color:var(--neon-pink);">高级硬件降噪已挂载</span>
    </div>

    <div class="control-panel">
        <div class="volume-slider-wrap">
            <span style="color:var(--neon-cyan)">🎤 我的麦克风</span>
            <input type="range" class="volume-slider mic-style" id="micVolumeSlider" min="0" max="100" value="100" oninput="adjustMicVolume(this.value)">
        </div>
        <div class="volume-slider-wrap">
            <span style="color:var(--neon-pink)">🔊 队友主音量</span>
            <input type="range" class="volume-slider" id="masterVolumeSlider" min="0" max="100" value="80" oninput="adjustMasterVolume(this.value)">
        </div>
    </div>

    <div class="seats-grid" id="seatsGrid"></div>

    <div class="chat-area" id="chatArea">
        <div class="msg-system">【广播】已升级 48kHz 电竞采样硬件算法降噪。双击麦位执行「拍一拍」震荡。</div>
    </div>

    <div class="game-feature-panel">
        <span class="feat-btn" onclick="sendQuickEmoji('🙏 阿门')">🙏 阿门</span>
        <span class="feat-btn" onclick="sendQuickEmoji('💗 喜欢')">💗 喜欢</span>
        <span class="feat-btn sc" onclick="triggerSuperChat()">💰 发送SC赤字</span>
        <span class="feat-btn meds" onclick="triggerTakeMeds()">💊 精神安定剂</span>
    </div>

    <div class="bottom-bar">
        <div class="btn-icon" id="micBtn" onclick="toggleMic()">🔇</div>
        <div class="bar-icon" onclick="document.getElementById('imageFileSlot').click()">🖼️</div>
        <input type="file" id="imageFileSlot" accept="image/*" style="display:none;" onchange="transmitChatImage(this)">
        
        <input type="text" class="input-box" id="msgInput" placeholder="给糖糖发消息..." autocomplete="off">
        <button class="enter-btn" style="padding:10px 16px; font-size:13px;" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const DEFAULT_SVG = `<svg viewBox="0 0 1024 1024"><path d="M512 512c141.4 0 256-114.6 256-256S653.4 0 512 0 256 114.6 256 256s114.6 256 256 256zM512 614.4c-243.2 0-512 121.6-512 364.8v44.8h1024v-44.8c0-243.2-268.8-364.8-512-364.8z" fill="#4a3e6d"/></svg>`;
    const AGORA_APP_ID = "3adf636b90314ac3901887e1560c0db5"; 
    const CHANNEL_NAME = "needy_streamer_angel_999";

    let mqttClient = null, agoraClient = null, localAudioTrack = null;
    let myName = "", myCustomAvatar = "", myAgoraUid = 0, isMuted = true, currentZoomScale = 1;
    let roomUsers = {};

    function resizeImg(file, bound, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const cvs = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > h) { if (w > bound) { h *= bound / w; w = bound; } }
                else { if (h > bound) { w *= bound / h; h = bound; } }
                cvs.width = w; cvs.height = h;
                cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                callback(cvs.toDataURL('image/jpeg', 0.7));
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function loadCustomAvatar(input) {
        if(!input.files || !input.files[0]) return;
        resizeImg(input.files[0], 100, function(b64) {
            myCustomAvatar = b64;
            document.getElementById('avatarPreview').innerHTML = `<img src="${b64}">`;
        });
    }

    function transmitChatImage(input) {
        if(!input.files || !input.files[0]) return;
        resizeImg(input.files[0], 240, function(b64) {
            publishLinePacket({ type: 'img', sender: myName, avatar: myCustomAvatar, payload: b64 });
        });
        input.value = '';
    }

    function openLightbox(src) {
        const modal = document.getElementById('lightboxModal');
        document.getElementById('targetLightboxImg').src = src;
        modal.style.display = 'flex';
        resetImageZoom();
    }
    function closeLightbox() { document.getElementById('lightboxModal').style.display = 'none'; }
    function adjustImageZoom(step) {
        currentZoomScale = Math.max(0.4, Math.min(4, currentZoomScale + step));
        document.getElementById('lightboxImgWrap').style.transform = `scale(${currentZoomScale})`;
    }
    function resetImageZoom() { currentZoomScale = 1; document.getElementById('lightboxImgWrap').style.transform = 'scale(1)'; }

    function sendQuickEmoji(val) { publishLinePacket({ type: 'chat', sender: myName, avatar: myCustomAvatar, payload: val }); }

    function triggerSuperChat() {
        const money = Math.floor(Math.random() * 899) + 100;
        publishLinePacket({ type: 'sc', sender: myName, amount: money });
    }

    function triggerTakeMeds() { publishLinePacket({ type: 'meds', sender: myName }); }

    function launchAngelRoom() {
        const nameInput = document.getElementById('nicknameInput').value.trim();
        if(!nameInput) { alert("起一个可爱的网名吧！"); return; }
        myName = nameInput;
        myAgoraUid = Math.floor(Math.random() * 89999) + 10000;

        document.getElementById('loginOverlay').style.display = 'none';
        renderBlankSeats();

        initMqttSync();
        initAgoraVoice();

        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') { sendMsg(); this.blur(); }
        });
    }

    function renderBlankSeats() {
        const grid = document.getElementById('seatsGrid');
        grid.innerHTML = '';
        for(let i = 1; i <= 8; i++) {
            grid.innerHTML += `
                <div class="seat-item" id="seat_${i}">
                    <div class="seat-pop-effect" id="pop_${i}">🎉</div>
                    <div class="seat-avatar-wrap">
                        ${DEFAULT_SVG}
                        <span class="seat-index">${i===1?'糖糖':i+'麦'}</span>
                    </div>
                    <span class="user-name">网络幽灵</span>
                </div>
            `;
        }
    }

    function bindPokeEventToSeats() {
        const users = Object.keys(roomUsers);
        users.forEach((username, idx) => {
            if(idx >= 8) return;
            const seatDom = document.getElementById(`seat_${idx + 1}`);
            if(seatDom) {
                seatDom.ondblclick = null;
                seatDom.ondblclick = () => { publishLinePacket({ type: 'poke', trigger: myName, target: username }); };
            }
        });
    }

    // --- 🍏 控音功能扩展：调节本地麦克风增益音量 ---
    function adjustMicVolume(value) {
        if (localAudioTrack) {
            // 声网硬件音量范围 0 - 100
            localAudioTrack.setVolume(parseInt(value));
            console.log("本地麦克风录音输出音量设定为:", value);
        }
    }

    // --- 🍏 控音功能扩展：拉动调节全局远端队友总音量 ---
    function adjustMasterVolume(value) {
        if (!agoraClient) return;
        agoraClient.remoteUsers.forEach(user => {
            if (user.audioTrack) {
                user.audioTrack.setVolume(parseInt(value));
            }
        });
        console.log("全局大厅队友播放音量设定为:", value);
    }

    // --- 🍏 核心技术更新：声网硬件高级算法防啸叫+极致降噪方案 ---
    async function initAgoraVoice() {
        try {
            agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

            agoraClient.on("user-published", async (user, mediaType) => {
                await agoraClient.subscribe(user, mediaType);
                if (mediaType === "audio") { 
                    user.audioTrack.play(); 
                    // 初始化对齐滑块设定的主音量
                    let sliderVol = document.getElementById('masterVolumeSlider').value;
                    user.audioTrack.setVolume(parseInt(sliderVol));
                }
            });

            agoraClient.enableAudioVolumeIndicator();
            agoraClient.on("volume-indicator", volumes => {
                volumes.forEach(vol => {
                    const users = Object.keys(roomUsers);
                    const targetName = users.find(name => roomUsers[name].agoraUid == vol.uid);
                    const index = users.indexOf(targetName);
                    if(index !== -1 && index < 8) {
                        const seatDom = document.getElementById(`seat_${index + 1}`);
                        if(seatDom) seatDom.classList.toggle('speaking', vol.level > 6);
                    }
                });
            });

            await agoraClient.join(AGORA_APP_ID, CHANNEL_NAME, null, myAgoraUid);
            appendSystemNotice("🔊 已经连通声网商业高可靠音频流。");

        } catch (e) { alert("声网加载失败，请确保当前在 HTTPS 线上加密链接下打开！"); }
    }

    async function toggleMic() {
        if(!agoraClient) return;
        isMuted = !isMuted;
        const btn = document.getElementById('micBtn');
        try {
            if(!localAudioTrack) {
                // 🍎【核心升级】：加载高级降噪参数约束，剔除环境杂音，阻断外部回声啸叫
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ 
                    AEC: true,               // 开启回声消除 (Echo Cancellation)
                    ANS: true,               // 开启高级智能降噪 (Automatic Noise Suppression)
                    AGC: true,               // 开启自动增益控制 (Automatic Gain Control)
                    audioSampleRate: 48000,  // 锁定 48kHz 电竞高清采样率
                    optimizationMode: "detail" 
                });
                await agoraClient.publish([localAudioTrack]);
            }
            
            await localAudioTrack.setEnabled(!isMuted);
            
            // 每次解禁开麦时，强制校准拉动条对应的麦克风增益，防止系统默认爆音
            if(!isMuted) {
                let micVol = document.getElementById('micVolumeSlider').value;
                localAudioTrack.setVolume(parseInt(micVol));
            }

            btn.innerText = isMuted ? "🔇" : "🎤";
            btn.classList.toggle('active', !isMuted);
            appendSystemNotice(isMuted ? "你已闭麦下麦" : "【硬件级高级降噪已启用】你现在可以清晰连麦说话了！");
            publishLinePacket({ type: 'mic', user: myName, isMuted: isMuted });
        } catch (err) { isMuted = true; alert("麦克风初始化被系统拉黑阻断！请检查系统隐私授权。"); }
    }

    // --- 数据同步层 (MQTT) ---
    function initMqttSync() {
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt'; 
        mqttClient = mqtt.connect(brokerUrl, { connectTimeout: 5000, clientId: 'angel_' + Math.random().toString(16).substr(2, 7) });

        mqttClient.on('connect', () => {
            mqttClient.subscribe(CHANNEL_NAME);
            publishLinePacket({ type: 'join', user: myName, agoraUid: myAgoraUid, avatar: myCustomAvatar, isMuted: isMuted });
        });

        mqttClient.on('message', (topic, packet) => {
            try {
                const data = JSON.parse(packet.toString());
                if (data.type === 'join') {
                    roomUsers[data.user] = { agoraUid: data.agoraUid, avatar: data.avatar, isMuted: data.isMuted };
                    refreshSeats();
                    appendSystemNotice(`【群通知】${data.user} 降临大厅`);
                    if(data.user !== myName) {
                        publishLinePacket({ type: 'sync_resp', user: myName, agoraUid: myAgoraUid, avatar: myCustomAvatar, isMuted: isMuted });
                    }
                } 
                else if (data.type === 'sync_resp') {
                    roomUsers[data.user] = { agoraUid: data.agoraUid, avatar: data.avatar, isMuted: data.isMuted };
                    refreshSeats();
                }
                else if (data.type === 'chat') {
                    appendChatBubble(data.sender, data.avatar, data.payload, false);
                }
                else if (data.type === 'img') {
                    appendChatBubble(data.sender, data.avatar, data.payload, true);
                }
                else if (data.type === 'mic') {
                    if(roomUsers[data.user]) roomUsers[data.user].isMuted = data.isMuted;
                    refreshSeats();
                }
                else if (data.type === 'poke') {
                    appendSystemNotice(`✨【拍一拍】${data.trigger} 拍了拍 ${data.target} 并且大喊：阿美莉卡大红心！`);
                    triggerSeatShakeAnimation(data.target, "⚡ 绝赞");
                }
                else if (data.type === 'sc') {
                    appendSuperChatMsg(data.sender, data.amount);
                }
                else if (data.type === 'meds') {
                    triggerMedsGlitchOverlay(data.sender);
                }
                else if (data.type === 'leave') {
                    delete roomUsers[data.user];
                    refreshSeats();
                }
            } catch (e) {}
        });
    }

    function refreshSeats() {
        renderBlankSeats();
        const users = Object.keys(roomUsers);
        users.forEach((username, index) => {
            if(index >= 8) return;
            const seatDom = document.getElementById(`seat_${index + 1}`);
            if(seatDom) {
                const avatarWrap = seatDom.querySelector('.seat-avatar-wrap');
                if(roomUsers[username].avatar) {
                    avatarWrap.innerHTML = `<img src="${roomUsers[username].avatar}"><span class="seat-index">${index===0?'糖糖':(index+1)+'麦'}</span>`;
                } else {
                    avatarWrap.innerHTML = `${DEFAULT_SVG}<span class="seat-index">${index===0?'糖糖':(index+1)+'麦'}</span>`;
                }
                const nameSpan = seatDom.querySelector('.user-name');
                nameSpan.innerText = username;
                nameSpan.style.color = "#ffffff";
                if(!roomUsers[username].isMuted) nameSpan.innerText += " 🎙️";
            }
        });
        bindPokeEventToSeats();
    }

    function triggerSeatShakeAnimation(username, text) {
        const users = Object.keys(roomUsers);
        const index = users.indexOf(username);
        if(index !== -1 && index < 8) {
            const seatDom = document.getElementById(`seat_${index + 1}`);
            const popDom = document.getElementById(`pop_${index + 1}`);
            if(seatDom && popDom) {
                seatDom.classList.add('shake-animation');
                popDom.innerText = text; popDom.style.display = 'block';
                setTimeout(() => { seatDom.classList.remove('shake-animation'); }, 400);
                setTimeout(() => { popDom.style.display = 'none'; }, 2500);
            }
        }
    }

    function triggerMedsGlitchOverlay(user) {
        appendSystemNotice(`💊【精神安定】${user} 给超天酱喂了精神安定剂！`);
        triggerSeatShakeAnimation(user, "💊 嗑药");
        const overlay = document.getElementById('glitchOverlay');
        overlay.style.display = 'block';
        setTimeout(() => { overlay.style.display = 'none'; }, 2000);
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;
        publishLinePacket({ type: 'chat', sender: myName, avatar: myCustomAvatar, payload: text });
        input.value = '';
    }

    function publishLinePacket(obj) {
        if(mqttClient && mqttClient.connected) mqttClient.publish(CHANNEL_NAME, JSON.stringify(obj), { qos: 0 });
    }

    function appendChatBubble(sender, avatarB64, content, isImg) {
        const chatArea = document.getElementById('chatArea');
        const isSelf = sender === myName;
        
        const row = document.createElement('div');
        row.className = `bubble-row ${isSelf ? 'self' : 'other'}`;

        if(!isSelf) {
            row.innerHTML += avatarB64 ? `<img class="msg-avatar" src="${avatarB64}">` : `<div class="msg-avatar" style="background:#221a36; display:flex; align-items:center; justify-content:center;">🛸</div>`;
        }

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'msg-body-wrap';
        if(!isSelf) bodyWrap.innerHTML += `<span class="msg-username">${sender}</span>`;

        const bubble = document.createElement('div');
        bubble.className = 'line-bubble';

        if(isImg) {
            const img = document.createElement('img');
            img.className = 'chat-img';
            img.src = content;
            img.onclick = () => openLightbox(content);
            bubble.appendChild(img);
        } else {
            const txt = document.createElement('span');
            txt.textContent = content;
            bubble.appendChild(txt);
        }

        bodyWrap.appendChild(bubble);
        row.appendChild(bodyWrap);
        chatArea.appendChild(row);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
    }

    function appendSuperChatMsg(sender, amount) {
        const chatArea = document.getElementById('chatArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-superchat';
        msgDiv.innerHTML = `💸 SuperChat：[${sender}] 向超天酱打赏了 ￥${amount} 元！阿美莉卡大红心！！！`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
        triggerSeatShakeAnimation(sender, `💸 ￥${amount}`);
    }

    function appendSystemNotice(text) {
        const chatArea = document.getElementById('chatArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-item msg-system';
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function leaveRoom() { if(confirm('要退回大统一局域网吗？')) { publishLinePacket({ type: 'leave', user: myName }); window.location.reload(); } }
</script>
